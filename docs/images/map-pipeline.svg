<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 510" font-family="'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a7aa8"/>
    </marker>
  </defs>
  <rect width="560" height="510" fill="#ffffff"/>

  <!-- browser region -->
  <text x="120" y="44" font-size="11" fill="#6b7480" letter-spacing="3">BROWSER</text>

  <rect x="120" y="56" width="320" height="84" rx="6" fill="#f5f7f9" stroke="#2b3036"/>
  <text x="136" y="80" font-size="12" font-weight="bold" fill="#2b3036">map function</text>
  <text x="136" y="102" font-size="11" fill="#4a7aa8">function (pixelCount) { … }</text>
  <text x="136" y="124" font-size="11" fill="#6b7480">full JavaScript — float64, Math.*</text>

  <line x1="280" y1="142" x2="280" y2="172" stroke="#4a7aa8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="294" y="162" font-size="10" fill="#4a7aa8">evaluated once, at save</text>

  <rect x="120" y="176" width="320" height="62" rx="6" fill="#f5f7f9" stroke="#2b3036"/>
  <text x="136" y="198" font-size="12" font-weight="bold" fill="#2b3036">coordinate array</text>
  <text x="136" y="222" font-size="11" fill="#6b7480">[[x,y], [x,y], …] — positions only</text>

  <!-- wifi divider -->
  <line x1="40" y1="270" x2="520" y2="270" stroke="#aab3bd" stroke-dasharray="5 5"/>
  <text x="46" y="264" font-size="11" fill="#6b7480" letter-spacing="3">WIFI</text>

  <line x1="280" y1="240" x2="280" y2="300" stroke="#4a7aa8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="294" y="256" font-size="10" fill="#4a7aa8">upload — data only;</text>
  <text x="294" y="292" font-size="10" fill="#4a7aa8">the function stays behind</text>

  <!-- device region -->
  <text x="120" y="296" font-size="11" fill="#6b7480" letter-spacing="3">PIXELBLAZE</text>

  <rect x="120" y="304" width="320" height="84" rx="6" fill="#f5f7f9" stroke="#2b3036"/>
  <text x="136" y="328" font-size="12" font-weight="bold" fill="#2b3036">device flash</text>
  <text x="136" y="350" font-size="11" fill="#6b7480">one map per device</text>
  <text x="136" y="372" font-size="11" fill="#6b7480">normalized to 0..1 — Fill / Contain</text>

  <line x1="280" y1="388" x2="280" y2="412" stroke="#4a7aa8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="294" y="406" font-size="10" fill="#4a7aa8">fed to the pattern, per frame</text>

  <rect x="120" y="416" width="320" height="62" rx="6" fill="#f5f7f9" stroke="#2b3036"/>
  <text x="136" y="440" font-size="12" font-weight="bold" fill="#4a7aa8">render2D(index, x, y)</text>
  <text x="136" y="462" font-size="11" fill="#6b7480">called for every pixel, every frame</text>
</svg>
