<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="40" y="26" font-size="12" font-weight="bold" fill="#2b3036">device cost per call, relative to one multiply</text>
  <text x="40" y="42" font-size="10" fill="#6b7480">fw 3.67, hardware microbenchmark — full table in the doc</text>

  <!-- bars: x starts 130, scale 400px = 12.2x -->
  <g font-size="11">
    <text x="122" y="74" text-anchor="end" fill="#2b3036">mul</text>
    <rect x="130" y="63" width="33" height="14" fill="#c7cdd4"/>
    <text x="169" y="74" fill="#6b7480">1.0</text>

    <text x="122" y="98" text-anchor="end" fill="#2b3036">add</text>
    <rect x="130" y="87" width="36" height="14" fill="#c7cdd4"/>
    <text x="172" y="98" fill="#6b7480">1.1</text>

    <text x="122" y="122" text-anchor="end" fill="#2b3036">triangle</text>
    <rect x="130" y="111" width="52" height="14" fill="#c7cdd4"/>
    <text x="188" y="122" fill="#6b7480">1.6</text>

    <text x="122" y="146" text-anchor="end" fill="#2b3036">div</text>
    <rect x="130" y="135" width="62" height="14" fill="#c7cdd4"/>
    <text x="198" y="146" fill="#6b7480">1.9</text>

    <text x="122" y="170" text-anchor="end" fill="#2b3036">frac</text>
    <rect x="130" y="159" width="66" height="14" fill="#c7cdd4"/>
    <text x="202" y="170" fill="#6b7480">2.0</text>

    <text x="122" y="194" text-anchor="end" fill="#2b3036">sin</text>
    <rect x="130" y="183" width="95" height="14" fill="#4a7aa8"/>
    <text x="231" y="194" fill="#6b7480">2.9</text>

    <text x="122" y="218" text-anchor="end" fill="#2b3036">wave</text>
    <rect x="130" y="207" width="95" height="14" fill="#4a7aa8"/>
    <text x="231" y="218" fill="#6b7480">2.9</text>
    <text x="260" y="218" font-size="10" fill="#4a7aa8">= sin — not the cheap one folklore says</text>

    <text x="122" y="242" text-anchor="end" fill="#2b3036">cos</text>
    <rect x="130" y="231" width="105" height="14" fill="#c7cdd4"/>
    <text x="241" y="242" fill="#6b7480">3.2</text>

    <text x="122" y="266" text-anchor="end" fill="#2b3036">sqrt</text>
    <rect x="130" y="255" width="115" height="14" fill="#c7cdd4"/>
    <text x="251" y="266" fill="#6b7480">3.5</text>

    <text x="122" y="290" text-anchor="end" fill="#2b3036">hypot</text>
    <rect x="130" y="279" width="118" height="14" fill="#c7cdd4"/>
    <text x="254" y="290" fill="#6b7480">3.6</text>
    <text x="288" y="290" font-size="10" fill="#6b7480">beats hand-rolled sqrt(x*x+y*y) at 6.6</text>

    <text x="122" y="314" text-anchor="end" fill="#2b3036">asin</text>
    <rect x="130" y="303" width="157" height="14" fill="#c7cdd4"/>
    <text x="293" y="314" fill="#6b7480">4.8</text>

    <text x="122" y="338" text-anchor="end" fill="#2b3036">perlin</text>
    <rect x="130" y="327" width="190" height="14" fill="#c7cdd4"/>
    <text x="326" y="338" fill="#6b7480">5.8</text>

    <text x="122" y="362" text-anchor="end" fill="#2b3036">pow</text>
    <rect x="130" y="351" width="279" height="14" fill="#4a7aa8"/>
    <text x="415" y="362" fill="#6b7480">8.5</text>

    <text x="122" y="386" text-anchor="end" fill="#2b3036">exp</text>
    <rect x="130" y="375" width="400" height="14" fill="#4a7aa8"/>
    <text x="536" y="386" fill="#6b7480">12.2</text>
    <text x="566" y="386" font-size="10" fill="#4a7aa8">hoist or approximate</text>
  </g>
</svg>
